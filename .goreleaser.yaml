# GoReleaser config for okashi — https://goreleaser.com
# Cuts prebuilt macOS + Linux binaries (arm64 + amd64) and uploads them + checksums to
# the GitHub Release. Homebrew is a planned follow-up (needs a homebrew_casks block + a
# tap repo/token — see RELEASING.md).
#
# Validate locally:   goreleaser check
# Dry run (no upload): goreleaser release --snapshot --clean
# Real release:        push a v* tag (see RELEASING.md).
version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - id: okashi
    main: .
    binary: okashi
    env:
      - CGO_ENABLED=0 # pure-Go default build; the optional Apple grammar backend is not shipped
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: okashi
    formats: [tar.gz]
    name_template: "okashi_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: snackztime
    name: okashi

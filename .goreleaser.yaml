# GoReleaser config for okashi — https://goreleaser.com
# Cuts prebuilt macOS + Linux binaries (arm64 + amd64), uploads them to the GitHub
# Release, and updates the Homebrew formula in the snackztime/homebrew-okashi tap.
#
# Validate locally:   goreleaser check
# Dry run (no upload): goreleaser release --snapshot --clean
# Real release:        push a v* tag (see RELEASING.md).
version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - id: okashi
    main: .
    binary: okashi
    env:
      - CGO_ENABLED=0 # pure-Go default build; the optional Apple grammar backend is not shipped
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: okashi
    formats: [tar.gz]
    name_template: "okashi_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: snackztime
    name: okashi

# Homebrew: installs the PREBUILT binary (no Go toolchain needed on the user's machine).
# Requires a one-time tap repo + token — see RELEASING.md. Remove this block to ship
# binaries only.
brews:
  - name: okashi
    repository:
      owner: snackztime
      name: homebrew-okashi
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/snackztime/okashi"
    description: "A lean terminal writing app for long-form manuscripts"
    license: "MIT"
    test: |
      assert_match "okashi #{version}", shell_output("#{bin}/okashi --version")

name: release

# Cut a release by pushing a version tag:  git tag v0.1.0 && git push origin v0.1.0
# GoReleaser builds macOS + Linux binaries, uploads them + checksums to the GitHub
# Release, and updates the Homebrew tap. See RELEASING.md for the one-time setup.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional — enables the Homebrew tap update. Unset it (and remove the brews
          # block in .goreleaser.yaml) to ship binaries only.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
